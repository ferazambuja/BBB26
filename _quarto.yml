project:
  type: website
  output-dir: _site
  resources:
    - data/derived/*.json
  render:
    - index.qmd
    - datas.qmd
    - evolucao.qmd
    - economia.qmd
    - relacoes.qmd
    - paredao.qmd
    - paredoes.qmd
    - cartola.qmd
    - provas.qmd
    - clusters.qmd
    - votacao.qmd
    - planta_debug.qmd
    - relacoes_debug.qmd

website:
  title: "BBB 26 — Painel de Reações"
  site-url: https://ferazambuja.github.io/BBB26/
  open-graph: true
  twitter-card: true
  image: assets/social-preview.jpg
  search: false
  navbar:
    title: "BBB26"
    left:
      - href: index.qmd
        text: "Painel"
      - href: evolucao.qmd
        text: "Evolução"
      - href: economia.qmd
        text: "Economia"
      - href: relacoes.qmd
        text: "Relações"
      - href: paredao.qmd
        text: "Paredão"
      - href: cartola.qmd
        text: "Cartola"
      - href: provas.qmd
        text: "Provas"
      - href: paredoes.qmd
        text: "Paredões"
      - href: votacao.qmd
        text: "Votação"
      - text: "Mais"
        menu:
          - href: datas.qmd
            text: "Datas"
          - href: clusters.qmd
            text: "Clusters"
          - href: planta_debug.qmd
            text: "Planta (debug)"
          - href: relacoes_debug.qmd
            text: "Relações (debug)"
  page-footer:
    center: |
      Projeto independente de análise de dados, sem vínculo com a TV Globo ou o BBB · Dados da API pública do GloboPlay + registros manuais (podem conter erros ou atrasos) · [Reportar problema](https://github.com/ferazambuja/BBB26/issues)
    background: dark
  repo-url: https://github.com/ferazambuja/BBB26

format:
  html:
    theme: darkly
    toc: false
    page-layout: full
    code-fold: true
    code-tools: true
    lang: pt-BR
    css:
      - assets/typography.css
      - assets/navbar.css
      - assets/plotly-fullscreen.css
      - assets/page-nav.css
      - assets/cards.css
      - assets/cartola.css
      - assets/provas.css
      - assets/economia.css
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
          <script data-goatcounter="https://bbb.goatcounter.com/count"
                  async src="//gc.zgo.at/count.js"></script>
    include-after-body:
      - text: |
          <script src="assets/plotly-fullscreen.js"></script>
          <script src="assets/page-nav.js"></script>
          <script src="assets/collapse-ui.js"></script>
          <script src="assets/cartola-ui.js"></script>
          <script src="assets/provas-ui.js"></script>
