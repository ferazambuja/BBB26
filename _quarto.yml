project:
  type: website
  output-dir: _site
  resources:
    - data/derived/*.json
  render:
    - index.qmd
    - datas.qmd
    - evolucao.qmd
    - relacoes.qmd
    - paredao.qmd
    - paredoes.qmd
    - cartola.qmd
    - provas.qmd
    - clusters.qmd
    - votacao.qmd
    - planta_debug.qmd
    - relacoes_debug.qmd

website:
  title: "BBB 26 — Painel de Reações"
  navbar:
    left:
      - href: index.qmd
        text: "📊 Painel"
      - href: evolucao.qmd
        text: "📈 Evolução"
      - href: relacoes.qmd
        text: "🤝 Relações"
      - href: paredao.qmd
        text: "🗳️ Paredão (Atual)"
      - href: cartola.qmd
        text: "🏆 Cartola"
      - href: provas.qmd
        text: "🏅 Provas"
      - href: paredoes.qmd
        text: "📚 Paredões"
      - href: votacao.qmd
        text: "⚖️ Voto<br>Único/Torcida"
      - text: "🔬 Mais"
        menu:
          - href: datas.qmd
            text: "🗓️ Datas"
          - href: clusters.qmd
            text: "🧪 Clusters"
          - href: planta_debug.qmd
            text: "🌱 Planta (debug)"
          - href: relacoes_debug.qmd
            text: "🧭 Relações (debug)"
  page-footer:
    center: |
      Dados: [GloboPlay API](https://www.globoplay.com.br/) · Projeto independente, sem vínculo com a TV Globo · [Reportar problema](https://github.com/ferazambuja/BBB26/issues)
    background: dark
  repo-url: https://github.com/ferazambuja/BBB26
  repo-actions: [issue]

format:
  html:
    theme: darkly
    toc: false
    page-layout: full
    code-fold: true
    code-tools: true
    lang: pt-BR
    css:
      - assets/typography.css
      - assets/plotly-fullscreen.css
      - assets/toc-offcanvas.css
      - assets/accessibility.css
      - assets/cards.css
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
          <script data-goatcounter="https://bbb.goatcounter.com/count"
                  async src="//gc.zgo.at/count.js"></script>
    include-after-body:
      - file: assets/disclaimer.html
      - text: |
          <script src="assets/plotly-fullscreen.js"></script>
          <script src="assets/toc-offcanvas.js"></script>
          <script src="assets/accessibility.js"></script>
