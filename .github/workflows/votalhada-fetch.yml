name: Votalhada Image Fetch

# Automated Votalhada poll image downloading.
#
# Runs at every observed Votalhada update window (BRT → UTC +3).
# The job self-gates on whether a paredão is active AND has a
# complete formation (indicados_finais). No-op runs take ~15s.
#
# Dedup: size+sha256 — identical images are skipped automatically.
# Images land in data/votalhada/YYYY_MM_DD/ with timestamped filenames.
#
# All observed BRT times from serie_temporal (P1–P9):
#   00:00  01:00  07:00  08:00  12:00  13:00
#   15:00  17:30  18:00  19:00  21:00  22:00
#
# Fetch 10 min after each expected update.

on:
  # DEACTIVATED post-BBB26 season (2026-04-22). Re-enable for BBB27.
  # schedule:
  #   # Hourly polling — catches all Votalhada update windows regardless of timing.
  #   # No-op runs (~15s) when images haven't changed (size+sha256 dedup).
  #   # Self-gates on active paredão with complete formation.
  #   # 24 runs/day × ~15s = ~6 min total compute. Only new images trigger commits.
  #   - cron: '10 * * * *'
  workflow_dispatch:
    inputs:
      paredao:
        description: 'Paredão number (auto-detect if empty)'
        required: false

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Detect active paredão with complete formation
        id: detect
        run: |
          PAREDAO=$(python3 -c "
          import json
          p = json.load(open('data/paredoes.json'))
          active = [
              x['numero'] for x in p['paredoes']
              if x['status'] == 'em_andamento'
              and x.get('indicados_finais')
              and len(x['indicados_finais']) > 0
          ]
          print(active[0] if active else '')
          ")
          OVERRIDE="${{ github.event.inputs.paredao }}"
          FINAL="${OVERRIDE:-$PAREDAO}"
          echo "paredao=$FINAL" >> "$GITHUB_OUTPUT"
          if [ -z "$FINAL" ]; then
            echo "No active paredão with complete formation. Skipping."
          else
            echo "Active paredão with formation: P$FINAL"
          fi

      - name: Fetch Votalhada images
        if: steps.detect.outputs.paredao != ''
        run: |
          python scripts/fetch_votalhada_images.py \
            --paredao ${{ steps.detect.outputs.paredao }} \
            --dedupe size+sha256

      - name: Check for new images
        id: check
        if: steps.detect.outputs.paredao != ''
        run: |
          CHANGES=$(git status --porcelain data/votalhada/ | wc -l | tr -d ' ')
          echo "changes=$CHANGES" >> "$GITHUB_OUTPUT"
          echo "New files: $CHANGES"

      - name: Commit and push
        if: steps.check.outputs.changes != '' && steps.check.outputs.changes != '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/votalhada/
          COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "data: votalhada P${{ steps.detect.outputs.paredao }} fetch ($COUNT images)"
          git pull --rebase origin main
          git push
