name: BBB26 Daily Update

# Two execution paths:
#
# 1. Cron (fallback): fetch → build → render → deploy (full pipeline)
#    GitHub Actions cron is unreliable (avg 67-min gaps). The LXC handles
#    primary polling. This remains as fallback.
#
# 2. Manual dispatch (from LXC): render → deploy ONLY
#    The LXC already fetched + built derived data + pushed to main.
#    GitHub just needs to render Quarto pages and deploy to Pages.
#    This saves ~2 min of redundant fetch + build.

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:  # Allow manual trigger (always runs full pipeline)

# NOTE: No workflow-level concurrency group. A lightweight 31-second schedule
# poll must NOT cancel a 4+ minute manual build+deploy. Concurrency is set
# per-job: build uses cancel-in-progress (avoid duplicate renders), deploy
# uses cancel-in-progress (latest site wins on Pages API).

# ── Job 1: fetch (lightweight, always runs, ~30 sec) ─────────────────────
# Only needs `requests`. Fetches API, saves snapshot if data changed,
# commits directly. No heavy deps, no build, no render.
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Commits snapshots directly
    outputs:
      data_changed: ${{ steps.check.outputs.data_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: pip install requests

      - name: Fetch latest data
        run: python scripts/fetch_data.py --fetch-only

      - name: Check for changes and commit
        id: check
        run: |
          if git status --porcelain | grep -q "data/"; then
            echo "data_changed=true" >> $GITHUB_OUTPUT
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add data/snapshots/ data/latest.json
            git commit -m "data: snapshot $(date -u +%Y-%m-%d_%H-%M) UTC"
            git push
          else
            echo "data_changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected — skipping build."
          fi

  # ── Job 2: build (read-only, conditional) ────────────────────────────────
  # Only runs when data changed OR manual dispatch.
  # Checks out the latest commit (including Job 1's snapshot commit).
  build:
    needs: fetch
    if: needs.fetch.outputs.data_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: "build"
      cancel-in-progress: true  # Avoid duplicate renders; latest data wins
    permissions:
      contents: read
    outputs:
      data_changed: ${{ needs.fetch.outputs.data_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # Get Job 1's commit
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Steps below only run on cron (full pipeline). ──
      # On manual dispatch, the LXC already built derived data — skip to render.
      - name: Validate JSON snapshots
        if: github.event_name == 'schedule'
        run: |
          python -c "
          import json
          import glob
          import sys

          errors = []
          for f in glob.glob('data/snapshots/*.json'):
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  if 'participants' in data:
                      participants = data['participants']
                  else:
                      participants = data
                  if not isinstance(participants, list):
                      errors.append(f'{f}: participants is not a list')
                  elif len(participants) == 0:
                      errors.append(f'{f}: empty participants list')
              except json.JSONDecodeError as e:
                  errors.append(f'{f}: invalid JSON - {e}')
              except Exception as e:
                  errors.append(f'{f}: error - {e}')

          if errors:
              print('Validation errors:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              n_files = len(glob.glob('data/snapshots/*.json'))
              print(f'All {n_files} snapshots valid')
          "

      - name: Build derived data
        if: github.event_name == 'schedule'
        run: python scripts/build_derived_data.py

      - name: Run integrity audit
        if: github.event_name == 'schedule'
        run: python scripts/audit_data_integrity.py --fail-on none

      - name: Print integrity audit summary
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("data/derived/integrity_audit.json").read_text(encoding="utf-8"))
          summary = data["summary"]
          print(
              "Integrity audit summary:"
              f" checks={summary['checks_run']}"
              f" critical={summary['critical_count']}"
              f" warning={summary['warning_count']}"
              f" info={summary['info_count']}"
          )
          PY

      - name: Run tests
        if: github.event_name == 'schedule'
        run: python -m pytest tests/ -v --tb=short --cov=scripts --cov-report=term-missing

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto site
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Upload data artifact
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: new-data
          path: |
            data/
            docs/MANUAL_EVENTS_AUDIT.md
          include-hidden-files: false

  # ── Job 3: deploy (write access) ─────────────────────────────────────
  # Deploys the site FIRST, then commits derived data changes.
  # This ensures a failed deploy does not leave orphaned data commits
  # with a stale site (H-2: deploy rollback).
  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: true  # Latest site wins on Pages API
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Only commit derived data on cron runs (LXC already committed on dispatch)
      - name: Download data artifact
        if: github.event_name == 'schedule'
        uses: actions/download-artifact@v4
        with:
          name: new-data
          path: .

      - name: Commit derived data changes
        if: github.event_name == 'schedule'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ docs/MANUAL_EVENTS_AUDIT.md docs/SCORING_AND_INDEXES.md
          git diff --staged --quiet || git commit -m "data: derived update $(date -u +%Y-%m-%d_%H-%M) UTC"
          git pull --rebase origin main || true
          git push
